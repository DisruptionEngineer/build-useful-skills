name: Prowlarr
type: prowlarr
service_group: arr_stack
image_patterns:
  - "linuxserver/prowlarr"
  - "hotio/prowlarr"
  - "prowlarr/prowlarr"
expected_ports: [9696]
api:
  health_endpoint: "/api/v1/system/status"
  auth_header: "X-Api-Key"
  version_field: "version"
config:
  path: "/config/config.xml"
  key_extraction: "xpath://ApiKey"
  format: xml
dependency_hints:
  depends_on: []
  feeds_into: ["sonarr", "radarr", "lidarr", "readarr"]
